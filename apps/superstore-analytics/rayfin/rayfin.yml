id: superstore-analytics
name: Superstore_analytics
version: 1.0.0
services:
  auth:
    enabled: true
    fabric:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5173
      - https://wide-sun-d9ef02947c-centralus.webapp.fabricapps.net
  data:
    enabled: false
  storage:
    enabled: false
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build:fabric
    indexDocument: index.html
  functions:
    enabled: false
